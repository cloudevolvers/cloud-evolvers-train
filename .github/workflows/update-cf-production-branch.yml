name: Update Cloudflare Pages Production Branch

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update production branch to master
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Updating Cloudflare Pages production branch from main to master..."

          RESPONSE=$(curl -s -X PATCH \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/cloud-evolvers-train" \
            -d '{"production_branch":"master"}')

          echo "$RESPONSE" | python3 -m json.tool

          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))")

          if [ "$SUCCESS" = "True" ]; then
            BRANCH=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['production_branch'])")
            echo "Production branch updated to: $BRANCH"
          else
            echo "Failed to update production branch"
            exit 1
          fi
